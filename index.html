<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* 全体のレイアウト設定 */
        body {
            background-color: #ffffff; /* 背景を白に */
            color: #333333; /* 文字は濃いグレーで目に優しく */
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 上部メインエリア */
        .top-section {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 8px solid #eeeeee;
        }

        /* 左上の年（西暦・和暦） */
        .year-group {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 2.2rem;
            color: #888888;
            display: flex;
            gap: 20px;
            font-weight: bold;
        }

        /* 中央の日付（最大化） */
        #date-display {
            font-size: 13rem; /* 日付をさらに大きく */
            font-weight: 900;
            color: #000000;
            margin-bottom: -10px;
            letter-spacing: -2px;
        }

        /* 中央の時刻（2段目・秒付き） */
        #clock-display {
            font-size: 9rem; /* 日付よりは控えめに、でもハッキリと */
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            color: #0055ff; /* 信頼感のある青色 */
        }

        /* 下部：流れるテロップ */
        .marquee-container {
            height: 150px;
            background-color: #f8f8f8; /* 薄いグレーで境界を分ける */
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 4.5rem;
            font-weight: bold;
            color: #d32f2f; /* 予定は注意を引く赤系 */
            display: inline-block;
            padding-left: 100%;
            animation: scroll-left 40s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <!-- 左上の年表示 -->
        <div class="year-group">
            <span id="western-year">----年</span>
            <span id="japanese-year">令和--年</span>
        </div>
        
        <!-- 中央2段：日付と時刻（秒付き） -->
        <div id="date-display">--月--日 (曜)</div>
        <div id="clock-display">00:00:00</div>
    </div>

    <!-- スクロールテロップ -->
    <div class="marquee-container">
        <div class="marquee-text">
            【連絡】本日の専門委員会は15:30から。　【行事】明日は創立記念日のため休校です。　【予定】4/15：英語検定申し込み締め切り。
        </div>
    </div>

    <script>
        function updateDisplay() {
            const now = new Date();
            
            // 1. 年（西暦・和暦）
            const year = now.getFullYear();
            document.getElementById('western-year').textContent = year + "年";
            const reiwaYear = year - 2018;
            document.getElementById('japanese-year').textContent = `令和${reiwaYear}年`;

            // 2. 日付
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayList = ["日", "月", "火", "水", "木", "金", "土"];
            const day = dayList[now.getDay()];
            document.getElementById('date-display').textContent = `${month}月${date}日 (${day})`;
            
            // 3. 時刻（時:分:秒）
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-display').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // 1秒ごとに更新
        updateDisplay();
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
